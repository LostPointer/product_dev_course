        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage
        run: pip install coverage==7.13.4

      - name: Download all shard coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-experiment-service-*
          path: projects/backend/services/experiment-service/_cov_data
          merge-multiple: true

      - name: Combine and report
        run: |
          set -euo pipefail
          mv _cov_data/.coverage.shard-* . 2>/dev/null || true
          coverage combine
          coverage xml -o coverage.xml
          coverage html -d htmlcov
          coverage report

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-experiment-service
          path: |
            projects/backend/services/experiment-service/htmlcov
            projects/backend/services/experiment-service/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  telemetry-ingest-service:
    name: telemetry-ingest-service tests (shard ${{ matrix.shard }}/2)
    needs: detect-changes
    if: needs.detect-changes.outputs.telemetry-ingest-service == 'true'
