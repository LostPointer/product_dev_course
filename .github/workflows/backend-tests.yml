name: Backend Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - projects/backend/**
      - .github/workflows/backend-tests.yml
  pull_request:
    branches:
      - main
      - develop
    paths:
      - projects/backend/**
      - .github/workflows/backend-tests.yml

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.detect.outputs.auth-service }}
      script-service: ${{ steps.detect.outputs.script-service }}
      experiment-service: ${{ steps.detect.outputs.experiment-service }}
      telemetry-ingest-service: ${{ steps.detect.outputs.telemetry-ingest-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        run: |
          # Get changed files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          fi

          # Check each service
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          for service in auth-service script-service experiment-service telemetry-ingest-service; do
            if echo "$CHANGED_FILES" | grep -E "^projects/backend/(services/$service|common)/|\.github/workflows/backend-tests\.yml" > /dev/null; then
              echo "$service=true" >> $GITHUB_OUTPUT
              echo "✓ $service changed"
            else
              echo "$service=false" >> $GITHUB_OUTPUT
              echo "✗ $service not changed"
            fi
          done

  auth-service:
    name: auth-service tests
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/backend/services/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pytest
        run: poetry run pytest -q --cov --cov-report=xml --cov-report=html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.job }}
          path: |
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/htmlcov
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  script-service:
    name: script-service tests
    needs: detect-changes
    if: needs.detect-changes.outputs.script-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/backend/services/script-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pytest
        run: poetry run pytest -q --cov --cov-report=xml --cov-report=html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.job }}
          path: |
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/htmlcov
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  experiment-service:
    name: experiment-service tests
    needs: detect-changes
    if: needs.detect-changes.outputs.experiment-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/backend/services/experiment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL + TimescaleDB
        run: |
          UBUNTU_CODENAME=$(lsb_release -cs)

          # Use PostgreSQL official repo (PGDG) for postgresql-16 >= 16.13;
          # TimescaleDB loader requires 16.13+, Ubuntu default is 16.12.
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt ${UBUNTU_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list

          # Add TimescaleDB APT repository.
          echo "deb https://packagecloud.io/timescale/timescaledb/ubuntu/ ${UBUNTU_CODENAME} main" \
            | sudo tee /etc/apt/sources.list.d/timescaledb.list
          curl -sL https://packagecloud.io/timescale/timescaledb/gpgkey | \
            gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/timescaledb.gpg >/dev/null

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-16 postgresql-contrib-16

          PG_MAJOR=16
          sudo apt-get install -y --no-install-recommends "timescaledb-2-postgresql-${PG_MAJOR}"

          # Copy TimescaleDB extension files to testsuite's PostgreSQL directory
          # testsuite uses its own PostgreSQL, so we need to find where it is
          echo "Finding testsuite PostgreSQL installation..."
          
          # Install poetry dependencies first to get testsuite
          cd ${{ github.workspace }}/projects/backend/services/experiment-service
          poetry install --no-interaction --no-root 2>/dev/null || true
          
          # Find testsuite's PostgreSQL bin directory
          TS_PG_BIN=$(poetry run python -c "from testsuite.databases.pgsql import config; print(config.PG_BIN_DIR)" 2>/dev/null || echo "")
          echo "Testsuite PG_BIN_DIR: $TS_PG_BIN"
          
          # Copy TimescaleDB files to both system and potential testsuite locations
          echo "Copying TimescaleDB extension files..."
          sudo cp -r /usr/share/timescaledb/* /usr/share/postgresql/16/extension/ 2>/dev/null || true
          sudo cp /usr/lib/postgresql/16/lib/timescaledb*.so /usr/lib/postgresql/16/lib/ 2>/dev/null || true
          
          # Also copy to common testsuite locations if they exist
          for ts_dir in /usr/share/postgresql /usr/lib/postgresql; do
            if [ -d "$ts_dir" ]; then
              echo "Copying to $ts_dir..."
              sudo cp -r /usr/share/timescaledb/* $ts_dir/*/extension/ 2>/dev/null || true
              sudo cp /usr/lib/postgresql/16/lib/timescaledb*.so $ts_dir/*/lib/ 2>/dev/null || true
            fi
          done

          # Verify TimescaleDB is installed
          echo "Verifying TimescaleDB installation..."
          ls -la /usr/lib/postgresql/16/lib/timescaledb*.so || true
          ls -la /usr/share/postgresql/16/extension/timescaledb*.control || true

          # Ensure PostgreSQL 16 binaries are in PATH
          echo "Adding PostgreSQL 16 to PATH..."
          echo "/usr/lib/postgresql/16/bin" >> $GITHUB_PATH

          # Verify pg_config points to PostgreSQL 16
          echo "Verifying pg_config..."
          which pg_config || true
          pg_config --version || true
          
          # Set environment variables for testsuite
          echo "PG_BIN=/usr/lib/postgresql/16/bin" >> $GITHUB_ENV
          echo "PG_SHARE=/usr/share/postgresql/16" >> $GITHUB_ENV
          echo "PG_LIB=/usr/lib/postgresql/16/lib" >> $GITHUB_ENV

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pytest
        run: poetry run pytest -q --cov --cov-report=xml --cov-report=html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.job }}
          path: |
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/htmlcov
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 14
  telemetry-ingest-service:
    name: telemetry-ingest-service tests
    needs: detect-changes
    if: needs.detect-changes.outputs.telemetry-ingest-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/backend/services/telemetry-ingest-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL + TimescaleDB
        run: |
          UBUNTU_CODENAME=$(lsb_release -cs)

          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt ${UBUNTU_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list

          echo "deb https://packagecloud.io/timescale/timescaledb/ubuntu/ ${UBUNTU_CODENAME} main" \
            | sudo tee /etc/apt/sources.list.d/timescaledb.list
          curl -sL https://packagecloud.io/timescale/timescaledb/gpgkey | \
            gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/timescaledb.gpg >/dev/null

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-16 postgresql-contrib-16

          PG_MAJOR=16
          sudo apt-get install -y --no-install-recommends "timescaledb-2-postgresql-${PG_MAJOR}"

          echo "Finding testsuite PostgreSQL installation..."

          cd ${{ github.workspace }}/projects/backend/services/telemetry-ingest-service
          poetry install --no-interaction --no-root 2>/dev/null || true

          TS_PG_BIN=$(poetry run python -c "from testsuite.databases.pgsql import config; print(config.PG_BIN_DIR)" 2>/dev/null || echo "")
          echo "Testsuite PG_BIN_DIR: $TS_PG_BIN"

          echo "Copying TimescaleDB extension files..."
          sudo cp -r /usr/share/timescaledb/* /usr/share/postgresql/16/extension/ 2>/dev/null || true
          sudo cp /usr/lib/postgresql/16/lib/timescaledb*.so /usr/lib/postgresql/16/lib/ 2>/dev/null || true

          for ts_dir in /usr/share/postgresql /usr/lib/postgresql; do
            if [ -d "$ts_dir" ]; then
              echo "Copying to $ts_dir..."
              sudo cp -r /usr/share/timescaledb/* $ts_dir/*/extension/ 2>/dev/null || true
              sudo cp /usr/lib/postgresql/16/lib/timescaledb*.so $ts_dir/*/lib/ 2>/dev/null || true
            fi
          done

          echo "Verifying TimescaleDB installation..."
          ls -la /usr/lib/postgresql/16/lib/timescaledb*.so || true
          ls -la /usr/share/postgresql/16/extension/timescaledb*.control || true

          echo "Adding PostgreSQL 16 to PATH..."
          echo "/usr/lib/postgresql/16/bin" >> $GITHUB_PATH

          echo "Verifying pg_config..."
          which pg_config || true
          pg_config --version || true

          echo "PG_BIN=/usr/lib/postgresql/16/bin" >> $GITHUB_ENV
          echo "PG_SHARE=/usr/share/postgresql/16" >> $GITHUB_ENV
          echo "PG_LIB=/usr/lib/postgresql/16/lib" >> $GITHUB_ENV

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pytest
        run: poetry run pytest -q --cov --cov-report=xml --cov-report=html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.job }}
          path: |
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/htmlcov
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 14
