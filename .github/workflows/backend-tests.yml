name: Backend Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - projects/backend/**
      - .github/workflows/backend-tests.yml
  pull_request:
    branches:
      - main
      - develop
    paths:
      - projects/backend/**
      - .github/workflows/backend-tests.yml

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.detect.outputs.auth-service }}
      script-service: ${{ steps.detect.outputs.script-service }}
      experiment-service: ${{ steps.detect.outputs.experiment-service }}
      telemetry-ingest-service: ${{ steps.detect.outputs.telemetry-ingest-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        run: |
          # Get changed files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          fi

          # Check each service
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          for service in auth-service script-service experiment-service telemetry-ingest-service; do
            if echo "$CHANGED_FILES" | grep -E "^projects/backend/(services/$service|common)/|\.github/workflows/backend-tests\.yml" > /dev/null; then
              echo "$service=true" >> $GITHUB_OUTPUT
              echo "✓ $service changed"
            else
              echo "$service=false" >> $GITHUB_OUTPUT
              echo "✗ $service not changed"
            fi
          done

  auth-service:
    name: auth-service tests (shard ${{ matrix.shard }}/2)
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-service == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    defaults:
      run:
        working-directory: projects/backend/services/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          installer-parallel: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: projects/backend/services/auth-service/poetry.lock

      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pytest (shard ${{ matrix.shard }}/2)
        run: |
          poetry run pytest -q \
            --shard-id=$(( ${{ matrix.shard }} - 1 )) \
            --num-shards=2 \
            --cov --cov-report= \
            --cov-fail-under=0

      - name: Rename coverage data file
        if: always()
        run: |
          ls -la .coverage* 2>/dev/null || true
          if [ -f .coverage ]; then
            mv .coverage .coverage.shard-${{ matrix.shard }}
          fi

      - name: Upload coverage data (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-auth-service-${{ matrix.shard }}
          path: projects/backend/services/auth-service/.coverage.shard-${{ matrix.shard }}
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 1

  auth-service-coverage:
    name: auth-service coverage merge
    needs: [detect-changes, auth-service]
    if: always() && needs.detect-changes.outputs.auth-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/backend/services/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage
        run: pip install coverage==7.13.4

      - name: Download all shard coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-auth-service-*
          path: projects/backend/services/auth-service/_cov_data
          merge-multiple: true

      - name: Combine and report
        run: |
          set -euo pipefail
          mv _cov_data/.coverage.shard-* . 2>/dev/null || true
          coverage combine
          coverage xml -o coverage.xml
          coverage html -d htmlcov
          coverage report

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-auth-service
          path: |
            projects/backend/services/auth-service/htmlcov
            projects/backend/services/auth-service/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  script-service:
    name: script-service tests
    needs: detect-changes
    if: needs.detect-changes.outputs.script-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/backend/services/script-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          installer-parallel: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: projects/backend/services/script-service/poetry.lock

      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pytest
        run: poetry run pytest -q --cov --cov-report=xml --cov-report=html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.job }}
          path: |
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/htmlcov
            ${{ github.workspace }}/projects/backend/services/${{ github.job }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  experiment-service:
    name: experiment-service tests (shard ${{ matrix.shard }}/4)
    needs: detect-changes
    if: needs.detect-changes.outputs.experiment-service == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    defaults:
      run:
        working-directory: projects/backend/services/experiment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          installer-parallel: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: projects/backend/services/experiment-service/poetry.lock

      - name: Set up PostgreSQL 16 + TimescaleDB
        uses: ./.github/actions/setup-timescaledb

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pytest (shard ${{ matrix.shard }}/4)
        run: |
          poetry run pytest -q \
            --shard-id=$(( ${{ matrix.shard }} - 1 )) \
            --num-shards=4 \
            --cov --cov-report= \
            --cov-fail-under=0

      - name: Rename coverage data file
        if: always()
        run: |
          ls -la .coverage* 2>/dev/null || true
          if [ -f .coverage ]; then
            mv .coverage .coverage.shard-${{ matrix.shard }}
          fi

      - name: Upload coverage data (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-experiment-service-${{ matrix.shard }}
          path: projects/backend/services/experiment-service/.coverage.shard-${{ matrix.shard }}
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 1

  experiment-service-coverage:
